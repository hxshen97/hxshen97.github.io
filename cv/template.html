<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @page { size: A4; margin: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Noto Sans SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10pt;
      line-height: 1.4;
      letter-spacing: -0.374px;
      color: #1d1d1f;
      background: #ffffff;
      padding: 12mm 16mm;
      width: 210mm;
      height: 297mm;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────── */
    .cv-name {
      font-size: 24pt;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.28px;
      line-height: 1.07;
      margin-bottom: 6px;
    }

    .cv-contact {
      font-size: 10pt;
      color: rgba(0, 0, 0, 0.56);
      margin-bottom: 14px;
      letter-spacing: -0.224px;
      line-height: 1.43;
    }

    .cv-contact a {
      color: #0066cc;
      text-decoration: none;
    }

    .cv-contact span.sep {
      margin: 0 8px;
      color: rgba(0, 0, 0, 0.16);
    }

    /* ── Summary ─────────────────────────────────── */
    .cv-summary {
      font-size: 10pt;
      color: rgba(0, 0, 0, 0.72);
      margin-bottom: 14px;
      line-height: 1.47;
      letter-spacing: -0.374px;
    }

    /* ── Section ─────────────────────────────────── */
    .cv-section {
      margin-bottom: 12px;
    }

    .cv-section-title {
      font-size: 12pt;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0066cc;
      border-bottom: 1.5px solid rgba(0, 0, 0, 0.08);
      padding-bottom: 3px;
      margin-bottom: 8px;
    }

    /* ── Entry ────────────────────────────────────── */
    .cv-entry {
      margin-bottom: 6px;
    }

    .cv-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .cv-entry-title {
      font-weight: 600;
      font-size: 10pt;
      color: #1d1d1f;
      letter-spacing: -0.374px;
    }

    .cv-entry-date {
      font-size: 10pt;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.48);
      white-space: nowrap;
      letter-spacing: -0.224px;
    }

    .cv-entry-org {
      font-size: 10pt;
      color: rgba(0, 0, 0, 0.48);
      margin-bottom: 2px;
      letter-spacing: -0.224px;
    }

    .cv-entry-desc {
      font-size: 10pt;
      color: rgba(0, 0, 0, 0.72);
      letter-spacing: -0.374px;
    }

    .cv-entry-bullets {
      list-style: none;
      padding-left: 0;
      font-size: 10pt;
      color: rgba(0, 0, 0, 0.72);
      letter-spacing: -0.374px;
    }

    .cv-entry-bullets li {
      margin-bottom: 1px;
      padding-left: 12px;
      position: relative;
    }

    .cv-entry-bullets li::before {
      content: "–";
      position: absolute;
      left: 0;
      color: rgba(0, 0, 0, 0.32);
    }

    /* ── Skills ───────────────────────────────────── */
    .cv-skills-grid {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 2px 14px;
      font-size: 10pt;
    }

    .cv-skills-label {
      font-weight: 600;
      color: #0066cc;
      font-size: 10pt;
      letter-spacing: -0.224px;
    }

    .cv-skills-items {
      color: rgba(0, 0, 0, 0.72);
      letter-spacing: -0.374px;
    }

    /* ── Publications ─────────────────────────────── */
    .cv-pub {
      margin-bottom: 4px;
      font-size: 10pt;
      color: rgba(0, 0, 0, 0.72);
      letter-spacing: -0.374px;
    }

    .cv-pub-title {
      font-weight: 600;
      color: #1d1d1f;
    }

    .cv-pub-venue {
      font-style: italic;
      color: #0066cc;
    }

    /* ── Chinese-specific overrides ──────────────── */
    html[lang="zh"] body {
      font-family: 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    html[lang="zh"] .cv-name {
      font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
      letter-spacing: 0.08em;
    }

    html[lang="zh"] .cv-section-title {
      font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
      text-transform: none;
      letter-spacing: 0.12em;
      font-size: 12pt;
    }

    html[lang="zh"] .cv-entry-title {
      letter-spacing: 0.01em;
    }

    html[lang="zh"] .cv-entry-bullets {
      letter-spacing: 0.01em;
    }

    html[lang="zh"] .cv-skills-label {
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  {{BODY}}
</body>
</html>
