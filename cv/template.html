<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @page { size: A4; margin: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 9.5pt;
      line-height: 1.45;
      color: #1a1a1a;
      background: #ffffff;
      padding: 15mm;
      width: 210mm;
      min-height: 297mm;
    }

    /* Header */
    .cv-name {
      font-size: 22pt;
      font-weight: 700;
      color: #10b981;
      margin-bottom: 4px;
    }

    .cv-contact {
      font-size: 8.5pt;
      color: #555555;
      margin-bottom: 14px;
    }

    .cv-contact a {
      color: #555555;
      text-decoration: none;
    }

    .cv-contact span.sep {
      margin: 0 6px;
      color: #cccccc;
    }

    /* Summary */
    .cv-summary {
      font-size: 9.5pt;
      color: #333333;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* Section */
    .cv-section {
      margin-bottom: 14px;
    }

    .cv-section-title {
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #10b981;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 3px;
      margin-bottom: 8px;
    }

    /* Entry */
    .cv-entry {
      margin-bottom: 8px;
    }

    .cv-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .cv-entry-title {
      font-weight: 600;
      font-size: 9.5pt;
    }

    .cv-entry-date {
      font-size: 8.5pt;
      color: #555555;
      white-space: nowrap;
    }

    .cv-entry-org {
      font-size: 8.5pt;
      color: #555555;
      margin-bottom: 2px;
    }

    .cv-entry-desc {
      font-size: 9pt;
      color: #333333;
    }

    .cv-entry-bullets {
      list-style: disc;
      padding-left: 16px;
      font-size: 9pt;
      color: #333333;
    }

    .cv-entry-bullets li {
      margin-bottom: 1px;
    }

    /* Skills */
    .cv-skills-grid {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 3px 12px;
      font-size: 9pt;
    }

    .cv-skills-label {
      font-weight: 600;
      color: #10b981;
      font-size: 8.5pt;
    }

    .cv-skills-items {
      color: #333333;
    }

    /* Publications */
    .cv-pub {
      margin-bottom: 4px;
      font-size: 9pt;
      color: #333333;
    }

    .cv-pub-title {
      font-weight: 600;
    }

    .cv-pub-venue {
      font-style: italic;
      color: #555555;
    }
  </style>
</head>
<body>
  {{BODY}}
</body>
</html>
